<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fireboard Card Preview</title>
  <style>
    :root {
      color-scheme: light;
      --primary-text-color: #1a1a1a;
      --secondary-text-color: #5a5a5a;
      --disabled-text-color: #9e9e9e;
      --primary-color: #03a9f4;
      --accent-color: #ff9800;
      --error-color: #db4437;
      --divider-color: #e0e0e0;
      --card-background-color: #fff;
      --secondary-background-color: #f5f5f5;
      --ha-card-background: #fff;
    }
    body.dark {
      color-scheme: dark;
      --primary-text-color: #ececec;
      --secondary-text-color: #9aa0a6;
      --disabled-text-color: #6e6e6e;
      --divider-color: #303030;
      --card-background-color: #1c1c1c;
      --secondary-background-color: #262626;
      --ha-card-background: #1c1c1c;
    }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f0f3f7;
      margin: 0;
      padding: 32px;
      display: flex;
      justify-content: center;
    }
    body.dark { background: #0f0f0f; }
    .stage { width: 480px; max-width: 100%; }
    .label { color: var(--secondary-text-color); font-size: 0.85rem; margin-bottom: 8px; }
    .toggle { position: fixed; top: 16px; right: 20px; padding: 6px 12px; border-radius: 6px; background: #fff; border: 1px solid #ccc; cursor: pointer; }
    body.dark .toggle { background: #222; color: #eee; border-color: #444; }

    /* Stub host components used inside the card. */
    ha-card {
      display: block;
      background: var(--ha-card-background);
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      color: var(--primary-text-color);
    }
    ha-icon {
      display: inline-block;
      width: var(--mdc-icon-size, 18px);
      height: var(--mdc-icon-size, 18px);
      vertical-align: middle;
    }
    ha-icon svg { width: 100%; height: 100%; fill: currentColor; }
  </style>
</head>
<body>
  <button class="toggle" onclick="document.body.classList.toggle('dark')">Toggle theme</button>
  <div class="stage">
    <div class="label">type: custom:fireboard-card</div>
    <fireboard-card id="card"></fireboard-card>
  </div>

  <script>
    /* --- Stub <ha-icon>: maps a small set of MDI names to inline SVG paths. --- */
    const MDI = {

      "mdi:fan": "M12,11A1,1 0 0,0 11,12A1,1 0 0,0 12,13A1,1 0 0,0 13,12A1,1 0 0,0 12,11M12.5,2C17,2 17.11,5.57 14.75,6.75C13.76,7.24 13.32,8.29 13.13,9.22C13.61,9.42 14.03,9.73 14.35,10.13C18.05,8.13 22.03,8.92 22.03,12.5C22.03,17 18.46,17.1 17.28,14.73C16.79,13.74 15.74,13.3 14.81,13.11C14.61,13.59 14.3,14 13.91,14.34C15.91,18.05 15.11,22.03 11.53,22.03C7.03,22.03 6.92,18.46 9.28,17.28C10.27,16.79 10.71,15.74 10.9,14.81C10.42,14.61 10,14.3 9.69,13.91C5.96,15.91 2,15.12 2,11.5C2,7 5.56,6.91 6.74,9.27C7.24,10.26 8.29,10.7 9.22,10.89C9.42,10.41 9.73,10 10.12,9.68C8.12,5.96 8.91,2 12.5,2Z",
      "mdi:battery": "M16,20H8V6H10.33V4H13.66V6H16M16.67,4H15V2H9V4H7.33A1.33,1.33 0 0,0 6,5.33V20.66C6,21.4 6.6,22 7.33,22H16.66C17.4,22 18,21.4 18,20.66V5.33A1.33,1.33 0 0,0 16.67,4Z",
      "mdi:battery-50": "M16,20H8V11H16M16.67,4H15V2H9V4H7.33A1.33,1.33 0 0,0 6,5.33V20.66C6,21.4 6.6,22 7.33,22H16.66C17.4,22 18,21.4 18,20.66V5.33C18,4.6 17.4,4 16.67,4Z",
      "mdi:clock-outline": "M12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12.5,7H11V13L16.25,16.15L17,14.92L12.5,12.25V7Z",
      "mdi:timer-outline": "M15,1H9V3H15M11,14H13V8H11M19.03,7.39L20.45,5.97C20,5.46 19.55,5 19.04,4.56L17.62,6C16.07,4.74 14.12,4 12,4A9,9 0 0,0 3,13A9,9 0 0,0 12,22C17,22 21,17.97 21,13C21,10.88 20.26,8.93 19.03,7.39M12,20A7,7 0 0,1 5,13A7,7 0 0,1 12,6A7,7 0 0,1 19,13A7,7 0 0,1 12,20Z",
      "mdi:timer-play-outline": "M9,8L15,12L9,16V8M15,1H9V3H15M19,13A7,7 0 0,1 12,20A7,7 0 0,1 5,13A7,7 0 0,1 12,6A7,7 0 0,1 19,13M21,13C21,10.88 20.26,8.93 19.03,7.39L20.45,5.97C20,5.46 19.55,5 19.04,4.56L17.62,6C16.07,4.74 14.12,4 12,4A9,9 0 0,0 3,13A9,9 0 0,0 12,22C17,22 21,17.97 21,13Z",
      "mdi:alert": "M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z",
      "mdi:format-list-bulleted": "M7,5H21V7H7V5M7,13V11H21V13H7M4,4.5A1.5,1.5 0 0,1 5.5,6A1.5,1.5 0 0,1 4,7.5A1.5,1.5 0 0,1 2.5,6A1.5,1.5 0 0,1 4,4.5M4,10.5A1.5,1.5 0 0,1 5.5,12A1.5,1.5 0 0,1 4,13.5A1.5,1.5 0 0,1 2.5,12A1.5,1.5 0 0,1 4,10.5M7,19V17H21V19H7M4,16.5A1.5,1.5 0 0,1 5.5,18A1.5,1.5 0 0,1 4,19.5A1.5,1.5 0 0,1 2.5,18A1.5,1.5 0 0,1 4,16.5Z",
      "mdi:chart-line": "M16,11.78L20.24,4.45L21.97,5.45L16.74,14.5L10.23,10.75L5.46,19H22V21H2V3H4V17.54L9.5,8L16,11.78Z",
      "mdi:speedometer-slow": "M12,16A3,3 0 0,1 9,13C9,11.88 9.61,10.9 10.5,10.39L20.21,4.77L14.68,14.35C14.18,15.33 13.17,16 12,16M12,3C13.81,3 15.5,3.5 16.97,4.32L14.87,5.53C14,5.19 13,5 12,5A8,8 0 0,0 4,13C4,15.21 4.89,17.21 6.34,18.65H6.35C6.74,19.04 6.74,19.67 6.35,20.06C5.96,20.45 5.32,20.45 4.93,20.07V20.07C3.12,18.26 2,15.76 2,13A10,10 0 0,1 12,3M22,13C22,15.76 20.88,18.26 19.07,20.07V20.07C18.68,20.45 18.05,20.45 17.66,20.06C17.27,19.67 17.27,19.04 17.66,18.65C19.11,17.2 20,15.21 20,13C20,12 19.81,11 19.46,10.1L20.67,8C21.5,9.5 22,11.18 22,13Z",
      "mdi:alert-circle-outline": "M11,15H13V17H11V15M11,7H13V13H11V7M12,2C6.47,2 2,6.5 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20Z",
    };
    class HaIcon extends HTMLElement {
      static get observedAttributes() { return ["icon"]; }
      attributeChangedCallback() { this._render(); }
      connectedCallback() {
        // Inline sizing so the element renders correctly inside shadow DOM,
        // where outer CSS rules don't reach. Mirrors HA's real ha-icon API.
        this.style.display = "inline-flex";
        this.style.alignItems = "center";
        this.style.justifyContent = "center";
        const size = getComputedStyle(this).getPropertyValue("--mdc-icon-size") || "18px";
        this.style.width = size.trim() || "18px";
        this.style.height = size.trim() || "18px";
        this._render();
      }
      _render() {
        const name = this.getAttribute("icon") || "";
        const path = MDI[name] || "M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z";
        this.innerHTML =
          `<svg viewBox="0 0 24 24" width="100%" height="100%" ` +
          `style="display:block;fill:currentColor"><path d="${path}"/></svg>`;
      }
    }
    customElements.define("ha-icon", HaIcon);

    /* --- Mock hass data — modeled on the redacted live response. --- */
    const now = new Date();
    const cookStart = new Date(now.getTime() - 11.3 * 3600 * 1000).toISOString();
    const lastSeen = new Date(now.getTime() - 30 * 1000).toISOString();
    const SMOKEY = "smokey-uuid";
    const PULSE = "pulse-uuid";

    function st(entity, state, attrs = {}) {
      return { entity_id: entity, state: String(state), attributes: { friendly_name: attrs.friendly_name || entity, ...attrs } };
    }
    function reg(entity_id, unique_id, device_id) {
      // Include a fullEntry the WS fallback would return; only entries
      // accessed via the EntityRegistryDisplayEntry path strip unique_id.
      return { entity_id, unique_id, device_id, platform: "fireboard" };
    }

    const states = {
      // Smokey — actively cooking
      "sensor.smokey_channel_3":        st("sensor.smokey_channel_3", "249.3", { friendly_name: "Smokey Channel 3", unit_of_measurement: "°F", device_class: "temperature", channel: 3, fireboard_kind: "channel" }),
      "sensor.smokey_setpoint":         st("sensor.smokey_setpoint",  "250.0", { friendly_name: "Smokey Setpoint",  unit_of_measurement: "°F", device_class: "temperature", fireboard_kind: "setpoint" }),
      "sensor.smokey_drive_output":     st("sensor.smokey_drive_output", "12", { friendly_name: "Smokey Drive output", unit_of_measurement: "%", fireboard_kind: "drive_output", tied_channel: 3 }),
      "sensor.smokey_battery":          st("sensor.smokey_battery", "46", { friendly_name: "Smokey Battery", unit_of_measurement: "%", device_class: "battery", fireboard_kind: "battery" }),
      "sensor.smokey_last_seen":        st("sensor.smokey_last_seen", lastSeen, { friendly_name: "Smokey Last seen", device_class: "timestamp", fireboard_kind: "last_seen" }),
      "sensor.smokey_cook_started":     st("sensor.smokey_cook_started", cookStart, { friendly_name: "Smokey Cook started", device_class: "timestamp", fireboard_kind: "cook_started" }),
      "sensor.smokey_cook_session":     st("sensor.smokey_cook_session", "Sat May 9 Session", { friendly_name: "Smokey Cook session", fireboard_kind: "cook_session" }),
      "binary_sensor.smokey_channel_3_alert": st("binary_sensor.smokey_channel_3_alert", "off", { friendly_name: "Smokey Alert", device_class: "problem", channel: 3, fireboard_kind: "alert" }),
      // Pulse — idle, no probes reading. Add an alerting probe to demonstrate styling.
      "sensor.pulse_internal":          st("sensor.pulse_internal", "118.0", { friendly_name: "Pulse Internal", unit_of_measurement: "°F", device_class: "temperature", channel: 1, fireboard_kind: "channel" }),
      "sensor.pulse_external":          st("sensor.pulse_external", "72.4",  { friendly_name: "Pulse External", unit_of_measurement: "°F", device_class: "temperature", channel: 2, fireboard_kind: "channel" }),
      "binary_sensor.pulse_channel_1_alert": st("binary_sensor.pulse_channel_1_alert", "on", { friendly_name: "Pulse Alert", device_class: "problem", channel: 1, fireboard_kind: "alert" }),
      "sensor.pulse_last_seen":         st("sensor.pulse_last_seen", lastSeen, { friendly_name: "Pulse Last seen", device_class: "timestamp", fireboard_kind: "last_seen" }),
    };
    const entities = {
      "sensor.smokey_channel_3":        reg("sensor.smokey_channel_3",        SMOKEY + "_channel_3",      SMOKEY),
      "sensor.smokey_setpoint":         reg("sensor.smokey_setpoint",         SMOKEY + "_setpoint",       SMOKEY),
      "sensor.smokey_drive_output":     reg("sensor.smokey_drive_output",     SMOKEY + "_drive_output",   SMOKEY),
      "sensor.smokey_battery":          reg("sensor.smokey_battery",          SMOKEY + "_battery",        SMOKEY),
      "sensor.smokey_last_seen":        reg("sensor.smokey_last_seen",        SMOKEY + "_last_seen",      SMOKEY),
      "sensor.smokey_cook_started":     reg("sensor.smokey_cook_started",     SMOKEY + "_cook_started",   SMOKEY),
      "sensor.smokey_cook_session":     reg("sensor.smokey_cook_session",     SMOKEY + "_cook_session",   SMOKEY),
      "binary_sensor.smokey_channel_3_alert": reg("binary_sensor.smokey_channel_3_alert", SMOKEY + "_channel_3_alert", SMOKEY),
      "sensor.pulse_internal":          reg("sensor.pulse_internal",          PULSE + "_channel_1",       PULSE),
      "sensor.pulse_external":          reg("sensor.pulse_external",          PULSE + "_channel_2",       PULSE),
      "binary_sensor.pulse_channel_1_alert": reg("binary_sensor.pulse_channel_1_alert", PULSE + "_channel_1_alert", PULSE),
      "sensor.pulse_last_seen":         reg("sensor.pulse_last_seen",         PULSE + "_last_seen",       PULSE),
    };
    const devices = {
      [SMOKEY]: { id: SMOKEY, name: "Smokey",  name_by_user: null, model: "FireBoard 2 Pro" },
      [PULSE]:  { id: PULSE,  name: "Pulse",   name_by_user: null, model: "Pulse" },
    };

    // --- Mock history: 2 hours of synthetic temperature points -------------
    // Smokey ch3 starts at the setpoint with realistic +/-5°F PID overshoot.
    // Pulse Internal ramps from 60 → 118 (food internal climbing).
    // Pulse External hovers around 72 (ambient).
    function buildHistory() {
      const out = {};
      const start = Date.now() - 2 * 3600 * 1000;
      const stepMs = 60 * 1000;
      const samples = (Math.floor((Date.now() - start) / stepMs)) + 1;
      const seriesPoint = (i, v) => ({ s: String(v.toFixed(2)), lu: (start + i * stepMs) / 1000 });

      out["sensor.smokey_channel_3"] = Array.from({ length: samples }, (_, i) => {
        const wobble = Math.sin(i / 5) * 4 + Math.sin(i / 13) * 2;
        return seriesPoint(i, 250 + wobble);
      });
      out["sensor.smokey_setpoint"] = Array.from({ length: 4 }, (_, i) => {
        // setpoint stayed flat at 250 the whole time
        return seriesPoint(Math.floor(i * samples / 4), 250);
      });
      out["sensor.pulse_internal"] = Array.from({ length: samples }, (_, i) => {
        const t = i / (samples - 1);
        return seriesPoint(i, 60 + (118 - 60) * t + Math.sin(i / 7) * 1.2);
      });
      out["sensor.pulse_external"] = Array.from({ length: samples }, (_, i) => {
        return seriesPoint(i, 72 + Math.sin(i / 11) * 1.5);
      });
      return out;
    }
    const HISTORY = buildHistory();

    const hass = {
      states, entities, devices,
      // Stub for history/history_during_period — the only WS call the card makes.
      callWS: async (msg) => {
        if (msg && msg.type === "history/history_during_period") {
          const out = {};
          for (const id of msg.entity_ids || []) {
            if (HISTORY[id]) out[id] = HISTORY[id];
          }
          return out;
        }
        return null;
      },
    };
  </script>

  <script src="../custom_components/fireboard/www/fireboard-card.js"></script>
  <script>
    const card = document.getElementById("card");
    card.setConfig({});
    card.hass = hass;
  </script>
</body>
</html>
